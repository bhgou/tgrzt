<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d1024" />
    <title>Demo Stage</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css?v=dock-v2" />
  </head>
  <body>
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>
    <div class="music-wave music-wave-left" aria-hidden="true"></div>
    <div class="music-wave music-wave-right" aria-hidden="true"></div>
    <div class="music-note music-note-a" aria-hidden="true">♪</div>
    <div class="music-note music-note-b" aria-hidden="true">♬</div>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="logo-mark" aria-label="Demo Sound logo">
            <svg
              class="logo-wave"
              viewBox="0 0 160 84"
              role="img"
              aria-hidden="true"
            >
              <path
                d="M9 42c0-4.7 3.6-8.1 8.6-8.1 5.6 0 7.7 4.7 12.8 4.7 8.6 0 9.7-8.5 18.1-8.5 7.2 0 7.8 7.5 10.2 18.8 1.8 8.6 4.2 16.2 10.7 16.2 5.1 0 8.8-4.9 13.1-10.8l18.1-25.6c5.5-7.8 10.5-8.3 13.7-4.5 2.8 3.3 2.5 8.8 1.3 15.2l-5.8 30.9c-1.4 7.6 8.7 10.3 12.2 3.3l18.5-37.5c2.7-5.5 7.8-8.3 13-6.3 5 1.9 7.4 7.2 6 12.5l-7.3 27.4c-2.2 8.2-12.4 10.7-18 4.3l-7.7-8.8-12.3 9.7c-7.5 5.9-18.4 1.4-19.5-8.1l-1.1-9.7-14.7 19.8c-7 9.4-21.8 6.4-24.5-4.9l-4.2-17.7-4.4 7.7c-4.1 7.3-12.9 10.4-20.6 7.3l-11.5-4.7c-4-1.6-6.7-5.4-6.7-9.6Z"
              />
              <circle cx="17" cy="42" r="7" />
            </svg>
          </div>
          <div class="brand-copy">
            <h1>Demo Stage</h1>
          </div>
        </div>
        <div id="topbar-title" class="topbar-title"></div>
        <div class="topbar-actions">
          <button
            id="support-toggle"
            class="topbar-support-btn"
            type="button"
            data-action="support-toggle"
            aria-label="Открыть чат поддержки"
          >
            <span class="nav-icon nav-support" aria-hidden="true"></span>
          </button>
          <div id="topbar-meta"></div>
        </div>
      </header>

      <main id="app" class="app-root"></main>

      <nav class="bottom-nav has-upload-fab">
        <button class="nav-btn is-active" data-view="home">
          <span class="nav-icon nav-home" aria-hidden="true"></span>
          <span>Главная</span>
        </button>
        <button class="nav-btn" data-view="search">
          <span class="nav-icon nav-search" aria-hidden="true"></span>
          <span>Поиск</span>
        </button>
        <button
          class="nav-btn nav-upload-fab"
          data-view="upload"
          aria-label="Загрузить музыку"
        >
          <span class="nav-icon nav-note" aria-hidden="true"></span>
          <span>Залить</span>
        </button>
        <button class="nav-btn" data-view="liked">
          <span class="nav-icon nav-heart" aria-hidden="true"></span>
          <span>Избранное</span>
        </button>
        <button
          class="nav-btn nav-profile-btn"
          data-view="profile"
          id="nav-profile-btn"
          aria-label="Кабинет"
        >
          <span class="nav-icon nav-profile" aria-hidden="true"></span>
        </button>
      </nav>
    </div>

    <div id="support-backdrop" class="support-backdrop"></div>
    <aside id="support-drawer" class="support-drawer"></aside>
    <div id="track-modal-backdrop" class="track-modal-backdrop"></div>
    <aside id="track-modal" class="track-modal" aria-hidden="true"></aside>
    <div id="toast" class="toast"></div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" src="/app.js?v=dock-v2"></script>
  </body>
</html>
